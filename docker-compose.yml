version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: finance_db_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: finance_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
  redis:
      image: redis:7-alpine
      container_name: finance_redis
      ports:
        - "6379:6379"
      volumes:
        - redis_data:/data
      restart: unless-stopped
      healthcheck:
        test: ["CMD", "redis-cli", "ping"]
        interval: 5s
        timeout: 3s
        retries: 5
  app:
    build: .
    container_name: finance_app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_SERVER: postgres   # имя сервиса, а не localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: finance_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
    depends_on:
      - redis
      - postgres
    restart: unless-stopped
  celery_worker:
    build: .
    container_name: finance_celery_worker
    command: celery -A app.celery_app worker --loglevel=info
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://postgres:...@postgres:5432/finance_db
    depends_on:
      - redis
      - postgres
    volumes:
      - ./app:/app/app

  flower:
    image: mher/flower
    container_name: finance_flower
    command: celery --broker=redis://redis:6379/0 flower --port=5555
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - celery_worker

volumes:
  postgres_data:
  redis_data: