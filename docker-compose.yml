version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: finance_db_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: finance_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
  redis:
      image: redis:7-alpine
      container_name: finance_redis
      ports:
        - "6379:6379"
      volumes:
        - redis_data:/data
      restart: unless-stopped
      healthcheck:
        test: ["CMD", "redis-cli", "ping"]
        interval: 5s
        timeout: 3s
        retries: 5
  app:
    build: .
    container_name: finance_app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_SERVER: postgres   # имя сервиса, а не localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: finance_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
    depends_on:
      - redis
      - postgres
    restart: unless-stopped
  worker:
    build: . # Используем тот же Dockerfile
    container_name: finance_worker
    command: rq worker --url redis://redis:6379 default
    environment:
      - REDIS_HOST=redis
      # Воркеру нужны ВСЕ переменные окружения, чтобы он мог работать с вашим кодом
      - POSTGRES_SERVER=postgres
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY} # и другие, если нужны
      - PYTHONPATH=/app # чтобы Python находил модуль app
    volumes:
      - ./app:/app/app # Монтируем код для живой разработки, если нужно
    depends_on:
      - redis
      - app # Воркер теоретически может стартовать и без app, но для логики пусть зависит
  dashboard:
    image: hannes221/rq-dashboard-fast:latest
    container_name: finance_dashboard
    ports:
      - "9181:8000" # Пробрасываем порт дашборда на хост
    environment:
      - REDIS_URL=redis://redis:6379 # Указываем, где находится Redis
    depends_on:
      - redis
volumes:
  postgres_data:
  redis_data: